<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixie FFlags</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
    :root { --bg:#0d1117; --panel:#161b22; --panel2:#1c2128; --border:#30363d; --accent:#e53535; }
    *,*::before,*::after{box-sizing:border-box}
    html,body{height:100%;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:#e6edf3;overflow-x:hidden}

    /* ANIMATIONS */
    @keyframes fadeInUp  {from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeInDn  {from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideR    {from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:translateX(0)}}
    @keyframes modalPop  {from{opacity:0;transform:scale(.92) translateY(14px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes toastIn   {from{opacity:0;transform:scale(.85) translateY(22px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes toastOut  {from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.85) translateY(8px)}}
    @keyframes spin      {to{transform:rotate(360deg)}}
    @keyframes pulseG    {0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.55)}50%{box-shadow:0 0 0 7px rgba(34,197,94,0)}}
    @keyframes pulseR    {0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.55)}50%{box-shadow:0 0 0 7px rgba(239,68,68,0)}}
    @keyframes colorPop  {from{transform:scale(.5)}to{transform:scale(1)}}
    @keyframes loadBar   {from{width:0}to{width:100%}}

    .fade-up     {animation:fadeInUp .4s ease both}
    .fade-up-d1  {animation:fadeInUp .4s .08s ease both;opacity:0}
    .fade-up-d2  {animation:fadeInUp .4s .16s ease both;opacity:0}
    .slide-r     {animation:slideR .38s ease both}
    .slide-r-d1  {animation:slideR .38s .1s ease both;opacity:0}
    .modal-anim  {animation:modalPop .3s cubic-bezier(.34,1.56,.64,1) both}
    .spin-ic     {animation:spin .8s linear infinite;display:inline-block}
    .pulse-g     {animation:pulseG 2s infinite}
    .pulse-r     {animation:pulseR 2s infinite}
    .cPop        {animation:colorPop .18s ease both}

    /* CARD */
    .card{transition:transform .28s ease,box-shadow .28s ease}
    .card:hover{transform:translateY(-3px);box-shadow:0 18px 28px -10px rgba(0,0,0,.55)}

    /* BUTTON */
    .btn{transition:all .18s ease;cursor:pointer;border:none;background:none;color:inherit}
    .btn:hover{transform:scale(1.04)}
    .btn:active{transform:scale(.96)}
    .dis{opacity:.35!important;cursor:not-allowed!important;pointer-events:none!important}

    /* INPUT */
    .inp{width:100%;background:var(--panel2);border:1.5px solid var(--border);border-radius:12px;
         padding:13px 16px;font-size:14px;color:#e6edf3;outline:none;
         transition:border-color .2s,box-shadow .2s;font-family:inherit}
    .inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 18%,transparent)}

    /* TEXTAREA */
    #fflags{width:100%;background:#0d1117;border:1.5px solid var(--border);border-radius:12px;
            padding:14px;font-family:'Fira Code','Courier New',monospace;font-size:12.5px;
            color:#c9d1d9;resize:none;outline:none;
            transition:border-color .2s,box-shadow .2s}
    #fflags:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 14%,transparent)}

    /* TOGGLE SWITCH */
    .sw{width:52px;height:28px;border-radius:14px;position:relative;cursor:pointer;
        transition:background .3s ease;flex-shrink:0}
    .sw-knob{position:absolute;top:4px;left:4px;width:20px;height:20px;background:#fff;border-radius:50%;
             box-shadow:0 1px 4px rgba(0,0,0,.4);transition:transform .32s cubic-bezier(.4,0,.2,1)}
    .sw.on{background:#22c55e}
    .sw.off{background:#ef4444}
    .sw.on .sw-knob{transform:translateX(24px)}
    .sw.off .sw-knob{transform:translateX(0)}

    /* DAYS SLIDE */
    .days-wrap{overflow:hidden;max-height:0;opacity:0;
               transition:max-height .36s ease,opacity .28s ease,margin-top .3s ease;margin-top:0}
    .days-wrap.open{max-height:140px;opacity:1;margin-top:14px}

    /* NICK BADGE */
    .nbadge{display:inline-flex;align-items:center;gap:7px;background:var(--panel2);
            border:1.5px solid var(--border);border-radius:10px;padding:5px 11px;
            cursor:pointer;transition:all .22s ease;user-select:none;position:relative}
    .nbadge:hover{transform:scale(1.07);border-color:var(--accent);
                  box-shadow:0 0 14px color-mix(in srgb,var(--accent) 28%,transparent)}
    .ndot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0}
    .ntxt{font-size:13px;font-weight:600}

    /* ACCOUNT DROPDOWN */
    .acc-drop{position:absolute;top:calc(100% + 8px);right:0;z-index:300;
              background:var(--panel);border:1.5px solid var(--border);border-radius:14px;
              padding:14px;width:220px;box-shadow:0 16px 40px rgba(0,0,0,.65);
              animation:fadeInDn .22s ease both}

    /* SCROLLBAR */
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#30363d;border-radius:99px}

    /* LANG */
    .lbtn{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;cursor:pointer;
          transition:all .18s ease;color:#8b949e;border:1.5px solid transparent;background:none}
    .lbtn.act{color:#e6edf3;border-color:var(--border);background:var(--panel2)}

    /* BG PILL */
    .bgpill{display:flex;gap:2px;background:var(--panel2);border:1.5px solid var(--border);border-radius:8px;padding:3px}
    .bgpill .bp{font-size:10px;font-weight:600;padding:3px 9px;border-radius:6px;cursor:pointer;
                transition:all .18s ease;color:#8b949e;background:transparent;border:none}
    .bgpill .bp.act{background:var(--border);color:#e6edf3}
  </style>
</head>
<body>
  <div id="app" style="max-width:980px;margin:0 auto;padding:20px"></div>

  <!-- Language bar (always visible) -->
  <div style="position:fixed;bottom:14px;right:16px;z-index:9998;display:flex;gap:4px;align-items:center">
    <button class="lbtn" id="lEn" onclick="setLang('en')">EN</button>
    <button class="lbtn" id="lRu" onclick="setLang('ru')">RU</button>
  </div>

<script>
/* ────────────── TRANSLATIONS ────────────── */
const S={
  en:{
    splash:'Loading…',
    welcome:'Welcome to Pixie FFlags',nick:'Username',pass:'Password',login:'Login',
    cfg:'ROBLOX FASTFLAGS CONFIGURATION',
    apply:'APPLY',saved2:'SAVED',reset:'RESET',saveC:'Save Config',launch:'LAUNCH ROBLOX',
    stTitle:'ROBLOX STATUS',refresh:'Refresh',mainA:'MAIN ACTIONS',cfgM:'CONFIG MANAGEMENT',
    support:'Support',adm:'Admin',
    running:'● Roblox is running',notrun:'● Roblox is not running',
    unknown:'● Status unknown',checking:'Checking…',clickChk:'Click to check',upd:'Updated: ',

    tCopied:'📋 Copied! Paste into ClientAppSettings.json',
    tBadJson:'❌ Invalid JSON!',tNoFF:'❌ Enter FFlags first',
    tSaved:'✅ Config saved!',tLoaded:'✅ Config loaded!',tReset:'⛔ FFlags reset',
    tTheme:'🎨 ',tBg:'Background changed',tLaunch:'▶ Launching Roblox…',
    tWrong:'❌ Wrong password',tCreds:'❌ Enter username and password',
    tDevLim:'🚫 Device limit reached for this account',
    tExpired:'❌ Account expired',
    saveQ:'Save login credentials?',saveDesc:'Next time fields will be auto-filled.',
    yes:'Yes',no:'No',
    accInfo:'Account Info',role:'Role',radmin:'Administrator',ruser:'User',
    expires:'Expires',perm:'Never',lastL:'Last login',devs:'Devices',logout:'Log out',
    adPanel:'👑 Admin Panel',online:'Online',total:'Total',
    newP:'➕ New Profile',exp:'📤 Export .txt',
    cTitle:'Create Profile',togOn:'Permanent account',togOff:'Temporary account',
    days:'Duration (days)',maxD:'Max devices',cancel:'Cancel',create:'Create',back:'Back',
    srch:'🔎 Search…',noF:'Nothing found',noS:'Nothing saved yet',
    confReset:'Reset all FFlags?',confDel:(n)=>`Delete user ${n}?`,
    taken:'Username taken',req:'Username and password required',
    bgD:'Dark',bgB:'Black',bgLbl:'BG:',
    created:(n)=>`Profile ${n} created!`,deleted:(n)=>`${n} deleted`,
    pcopied:(n)=>`Password for ${n} copied`,exported:'📤 Exported',
    never:'Never',mAgo:(m)=>`${m}m ago`,hAgo:(h)=>`${h}h ago`,now:'Just now',
    fPick:'Select ClientAppSettings.json',
    fDesc:'Path: C:\\Users\\[you]\\AppData\\Local\\Roblox\\Versions\\[version]\\',

  ru:{
    splash:'Загрузка…',
    welcome:'Добро пожаловать в Pixie FFlags',nick:'Ник',pass:'Пароль',login:'Войти',
    cfg:'ROBLOX FASTFLAGS КОНФИГУРАЦИЯ',
    apply:'ПРИМЕНИТЬ',saved2:'СОХРАНЁННЫЕ',reset:'СБРОСИТЬ',saveC:'Сохранить конфиг',launch:'ЗАПУСТИТЬ ROBLOX',
    stTitle:'СТАТУС ROBLOX',refresh:'Обновить',mainA:'ДЕЙСТВИЯ',cfgM:'КОНФИГУРАЦИИ',
    support:'Поддержка',adm:'Админ',
    running:'● Roblox запущен',notrun:'● Roblox не запущен',
    unknown:'● Статус неизвестен',checking:'Проверка…',clickChk:'Нажми для проверки',upd:'Обновлено: ',
    chars:' симв.',fmt:'{ } Format',clr:'✕ Очистить',
    tApplied:'✅ FFlags применены! Перезапусти Roblox.',
    tCopied:'📋 Скопировано! Вставь в ClientAppSettings.json',
    tBadJson:'❌ Некорректный JSON!',tNoFF:'❌ Введите FFlags',
    tSaved:'✅ Конфиг сохранён!',tLoaded:'✅ Конфиг загружен!',tReset:'⛔ FFlags сброшены',
    tTheme:'🎨 ',tBg:'Фон изменён',tLaunch:'▶ Запускаю Roblox…',
    tWrong:'❌ Неверный пароль',tCreds:'❌ Введите ник и пароль',
    tDevLim:'🚫 Достигнут лимит устройств',
    tExpired:'❌ Аккаунт истёк',
    saveQ:'Сохранить данные входа?',saveDesc:'При следующем входе поля заполнятся автоматически.',
    yes:'Да',no:'Нет',
    accInfo:'Информация об аккаунте',role:'Роль',radmin:'Администратор',ruser:'Пользователь',
    expires:'Срок',perm:'Навсегда',lastL:'Последний вход',devs:'Устройств',logout:'Выйти',
    adPanel:'👑 Админ-панель',online:'Онлайн',total:'Всего',
    newP:'➕ Новый профиль',exp:'📤 Экспорт .txt',
    cTitle:'Создать профиль',togOn:'Аккаунт навсегда',togOff:'Аккаунт на время',
    days:'Срок действия (дней)',maxD:'Макс. устройств',cancel:'Отмена',create:'Создать',back:'Назад',
    srch:'🔎 Поиск по нику…',noF:'Ничего не найдено',noS:'Пока ничего не сохранено',
    confReset:'Сбросить все FFlags?',confDel:(n)=>`Удалить пользователя ${n}?`,
    taken:'Ник уже занят',req:'Ник и пароль обязательны',
    bgD:'Тёмный',bgB:'Чёрный',bgLbl:'Фон:',
    created:(n)=>`Профиль ${n} создан!`,deleted:(n)=>`${n} удалён`,
    pcopied:(n)=>`Пароль ${n} скопирован`,exported:'📤 Список экспортирован',
    never:'Никогда',mAgo:(m)=>`${m} мин. назад`,hAgo:(h)=>`${h} ч. назад`,now:'Только что',
    fPick:'Выбери ClientAppSettings.json',
    fDesc:'Путь: C:\\Users\\[ты]\\AppData\\Local\\Roblox\\Versions\\[версия]\\',
    fSaved:'📂 Файл запомнен. Следующие ПРИМЕНИТЬ — автоматические.',
  }
};

/* ────────────── PALETTE  (0 = Red = default) ────────────── */
const PAL=[
  {ru:'Красная',     en:'Red',          c:'#e53535'},
  {ru:'Синяя',       en:'Blue',         c:'#1e90ff'},
  {ru:'Розовая',     en:'Pink',         c:'#ff69b4'},
  {ru:'Зелёная',     en:'Green',        c:'#00ff7f'},
  {ru:'Фиолетовая',  en:'Purple',       c:'#ba55d3'},
  {ru:'Оранжевая',   en:'Orange',       c:'#ff8c00'},
  {ru:'Бирюзовая',   en:'Teal',         c:'#40e0d0'},
  {ru:'Мятная',      en:'Mint',         c:'#00ffcc'},
  {ru:'Жёлтая',      en:'Yellow',       c:'#ffd700'},
  {ru:'Лайм',        en:'Lime',         c:'#aaff00'},
  {ru:'Ультрафиолет',en:'Ultraviolet',  c:'#7b2ff7'},
  {ru:'Аквамарин',   en:'Aquamarine',   c:'#00d4ff'},
  {ru:'Коралл',      en:'Coral',        c:'#ff6b6b'},
  {ru:'Малиновая',   en:'Crimson',      c:'#e91e8c'},
  {ru:'Золотая',     en:'Gold',         c:'#ffc700'},
  {ru:'Тёмно-синяя', en:'Navy',         c:'#1a3aff'},
  {ru:'Серебряная',  en:'Silver',       c:'#b0b8c1'},
  {ru:'Белая',       en:'White',        c:'#f0f0f0'},
];
const BG={dark:'#0d1117',black:'#000000'};
const PANEL={dark:['#161b22','#1c2128'],black:['#0d0d0d','#141414']};

/* ────────────── STATE ────────────── */
let lang    = localStorage.getItem('pxLang')  || 'en';
let cidx    = parseInt(localStorage.getItem('pxCidx') || '0');
let bgMode  = localStorage.getItem('pxBg')   || 'dark';
let accent  = PAL[cidx].c;

let users   = JSON.parse(localStorage.getItem('pixie_users')) || {
  Pixie:{password:'KP7224',      last_login:Date.now(),is_admin:true, expiration:null,maxDevices:999,devices:[]},
  Kuga: {password:'KKK7224f',   last_login:Date.now(),is_admin:true, expiration:null,maxDevices:999,devices:[]},
  Elka: {password:'pocxalka228',last_login:Date.now(),is_admin:true, expiration:null,maxDevices:999,devices:[]},
};
let curUser=null,isAdm=false,lastFF='';
let ffHandle=null;          // FileSystemFileHandle (session only)

// Roblox status
let rblxRunning=null;
let rblxLaunchAt=0;
let rblxFail=0;
let rblxIv=null;

// Toast
let _toast=null;

/* ────────────── HELPERS ────────────── */
const t    = k=>(S[lang]||S.en)[k]||(S.en[k]||k);
const tf   = (k,...a)=>{ const fn=(S[lang]||S.en)[k]; return typeof fn==='function'?fn(...a):(fn||k); };
const pn   = ()=>PAL[cidx][lang]||PAL[cidx].ru;
const isDkColor=c=>['#f0f0f0','#ffd700','#aaff00','#b0b8c1'].includes(c);
const acFg =()=>isDkColor(accent)?'#000':'#fff';

function saveUsers(){
  const now=Date.now();
  Object.keys(users).forEach(n=>{if(users[n].expiration&&users[n].expiration<now)delete users[n];});
  localStorage.setItem('pixie_users',JSON.stringify(users));
}
function savePref(){
  localStorage.setItem('pxLang',lang);
  localStorage.setItem('pxCidx',String(cidx));
  localStorage.setItem('pxBg',bgMode);
}
function applyAccent(){
  accent=PAL[cidx].c;
  document.documentElement.style.setProperty('--accent',accent);
}
function applyBg(){
  document.body.style.background=BG[bgMode];
  document.documentElement.style.setProperty('--bg',BG[bgMode]);
  const [p,p2]=PANEL[bgMode];
  document.documentElement.style.setProperty('--panel',p);
  document.documentElement.style.setProperty('--panel2',p2);
}
function refreshLangBar(){
  document.getElementById('lEn')?.classList.toggle('act',lang==='en');
  document.getElementById('lRu')?.classList.toggle('act',lang==='ru');
}
function setLang(l){lang=l;savePref();render(_scr);}

function getDeviceId(){
  let d=localStorage.getItem('pxDid');
  if(d)return d;
  try{
    const cv=document.createElement('canvas'),cx=cv.getContext('2d');
    cx.font='13px Arial';cx.fillText('pf',2,2);
    const fp=cv.toDataURL().slice(-16);
    const raw=[navigator.userAgent,navigator.language,screen.width+'x'+screen.height,
               new Date().getTimezoneOffset(),navigator.hardwareConcurrency||0,fp].join('|');
    let h=5381;for(let i=0;i<raw.length;i++){h=((h<<5)+h)+raw.charCodeAt(i);h=h&h;}
    d=Math.abs(h).toString(36);
  }catch{d='d'+Math.random().toString(36).slice(2,10);}
  localStorage.setItem('pxDid',d);return d;
}

function showToast(txt,col){
  if(_toast){
    clearTimeout(_toast._t);
    _toast.style.animation='toastOut .2s ease forwards';
    const old=_toast;
    setTimeout(()=>old.remove(),200);
    _toast=null;
  }
  setTimeout(()=>{
    const el=document.createElement('div');
    el.style.cssText=`position:fixed;bottom:52px;right:16px;z-index:9999;padding:11px 16px;
      border-radius:12px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;
      max-width:300px;background:var(--panel);border:2px solid ${col};color:${col};
      box-shadow:0 8px 24px rgba(0,0,0,.5);animation:toastIn .35s cubic-bezier(.34,1.56,.64,1) both`;
    el.innerHTML=txt;
    document.body.appendChild(el);
    _toast=el;
    el._t=setTimeout(()=>{
      el.style.animation='toastOut .28s ease forwards';
      setTimeout(()=>{el.remove();if(_toast===el)_toast=null;},280);
    },3200);
  },_toast?250:0);
}

function fmtT(ts){
  if(!ts)return t('never');
  const m=Math.floor((Date.now()-ts)/60000);
  return m<1?t('now'):m<60?tf('mAgo',m):tf('hAgo',Math.floor(m/60));
}
function fmtD(ts){return ts?new Date(ts).toLocaleDateString(lang==='ru'?'ru-RU':'en-US'):t('perm');}

document.addEventListener('click',e=>{
  if(!e.target.closest('.nbadge')&&!e.target.closest('.acc-drop'))
    document.getElementById('accDrop')?.remove();
});

/* ────────────── RENDER ────────────── */
let _scr='splash';
function render(s){
  _scr=s;
  if(rblxIv){clearInterval(rblxIv);rblxIv=null;}
  document.getElementById('app').innerHTML='';
  applyAccent();applyBg();refreshLangBar();
  if(s==='splash')  _splash();
  else if(s==='welcome') _welcome();
  else if(s==='main')    _main();
  else if(s==='admin')   _admin();
}

/* ─── SPLASH ─── */
function _splash(){
  document.getElementById('app').innerHTML=`
    <div style="height:100vh;display:flex;align-items:center;justify-content:center">
      <div class="fade-up" style="text-align:center">
        <h1 style="font-size:68px;font-weight:800;letter-spacing:-2px;color:${accent};margin:0 0 8px">Pixie FFlags</h1>
        <p style="color:#8b949e;font-size:18px;margin:0 0 28px">${t('splash')}</p>
        <div style="width:180px;height:3px;background:var(--panel2);border-radius:99px;overflow:hidden;margin:0 auto">
          <div style="height:100%;background:${accent};border-radius:99px;animation:loadBar 2.8s ease forwards"></div>
        </div>
      </div>
    </div>`;
  setTimeout(()=>render('welcome'),3000);
}

/* ─── WELCOME ─── */
function _welcome(){
  const saved=JSON.parse(localStorage.getItem('pxAuto')||'null');
  document.getElementById('app').innerHTML=`
    <div style="max-width:440px;margin:70px auto">
      <div class="fade-up" style="background:var(--panel);border:1.5px solid var(--border);border-radius:20px;padding:32px">
        <h1 style="font-size:28px;font-weight:800;text-align:center;color:${accent};margin:0 0 4px">Pixie FFlags</h1>
        <p style="text-align:center;color:#8b949e;font-size:13px;margin:0 0 24px">${t('welcome')}</p>
        <input id="iN" class="inp" placeholder="${t('nick')}" value="${saved?saved.n:''}" style="margin-bottom:9px"
          onkeydown="if(event.key==='Enter')document.getElementById('iP').focus()">
        <input id="iP" class="inp" type="password" placeholder="${t('pass')}" value="${saved?saved.p:''}" style="margin-bottom:20px"
          onkeydown="if(event.key==='Enter')doLogin()">
        <button onclick="doLogin()" class="btn" style="width:100%;padding:13px;background:${accent};color:${acFg()};
          font-weight:700;font-size:15px;border-radius:12px">${t('login')}</button>
        <!-- Color picker -->
        <div class="fade-up-d1" style="display:flex;align-items:center;justify-content:center;gap:10px;margin-top:18px">
          <button onclick="shiftC(-1)" class="btn" style="width:30px;height:30px;background:var(--panel2);
            border:1.5px solid var(--border);border-radius:50%;color:#8b949e;font-size:16px;display:flex;align-items:center;justify-content:center">‹</button>
          <div style="display:flex;align-items:center;gap:7px">
            <div id="wDot" class="cPop" style="width:11px;height:11px;border-radius:50%;background:${accent}"></div>
            <span id="wNm" style="font-size:12px;color:#8b949e;min-width:88px;text-align:center">${pn()}</span>
          </div>
          <button onclick="shiftC(+1)" class="btn" style="width:30px;height:30px;background:var(--panel2);
            border:1.5px solid var(--border);border-radius:50%;color:#8b949e;font-size:16px;display:flex;align-items:center;justify-content:center">›</button>

function setBg(m){

/* ─── LOGIN ─── */
function doLogin(){
  const nick=(document.getElementById('iN')?.value||'').trim();
  const pass=(document.getElementById('iP')?.value||'').trim();
  if(!nick||!pass)return showToast(t('tCreds'),'#ef4444');

  if(!users[nick]){
    users[nick]={password:pass,last_login:Date.now(),is_admin:false,expiration:null,maxDevices:1,devices:[]};
    saveUsers();
  }
  const u=users[nick];
  if(u.password!==pass)return showToast(t('tWrong'),'#ef4444');
  if(u.expiration&&u.expiration<Date.now())return showToast(t('tExpired'),'#ef4444');

  const did=getDeviceId();
  if(!u.devices)u.devices=[];
  if(!u.maxDevices)u.maxDevices=1;
  if(!u.devices.includes(did)){
    if(u.devices.length>=u.maxDevices)return showToast(t('tDevLim'),'#ef4444');
    u.devices.push(did);
  }
  u.last_login=Date.now();
  saveUsers();
  curUser=nick;isAdm=u.is_admin;
  render('main');

  // Ask to save login
  const af=JSON.parse(localStorage.getItem('pxAuto')||'null');
  if(!af||(af.n!==nick))setTimeout(()=>askSave(nick,pass),700);
}

/* ─── ROBLOX STATUS ─── */
function checkRblx(){
  if(rblxLaunchAt&&Date.now()-rblxLaunchAt<65000)return; // guard after launch
  _stUI('chk');
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),2800);
  fetch('http://localhost:1942/',{signal:ctrl.signal,mode:'no-cors'})
    .then(()=>{ clearTimeout(tid); rblxFail=0; _setRblx(true); })
    .catch(()=>{ clearTimeout(tid); rblxFail++;
      if(rblxFail>=2||rblxRunning===null) _setRblx(false);
    });
}

function _setRblx(r){
  rblxRunning=r;
  const now=new Date().toLocaleTimeString(lang==='ru'?'ru-RU':'en-US');
  const txt=r?t('running'):t('notrun');
  const col=r?'#22c55e':'#ef4444';
  const cls=r?'pulse-g':'pulse-r';
  const d=document.getElementById('sDot');
  if(d){d.style.background=col;d.className=cls;}
  const st=document.getElementById('sTxt');
  if(st)st.innerHTML=`<span style="color:${col};font-weight:600">${txt}</span>`;
  const sc=document.getElementById('scTxt');
  if(sc)sc.innerHTML=`<span style="color:${col};font-weight:600">${txt}</span>`;
  const ts=t('upd')+now;
  const el1=document.getElementById('sTime'),el2=document.getElementById('scTime');
  if(el1)el1.textContent=ts;if(el2)el2.textContent=ts;
}

function _stUI(s){
  if(s==='chk'){
    const st=document.getElementById('sTxt'),sc=document.getElementById('scTxt');
    const d=document.getElementById('sDot');
    if(st)st.innerHTML=`<span style="color:#8b949e">${t('checking')}</span>`;
    if(sc)sc.innerHTML=`<span style="color:#8b949e">${t('checking')}</span>`;
    if(d){d.style.background='#8b949e';d.className='';}
  }
}

/* ─── LAUNCH ROBLOX ─── */
function launchRblx(){
  const btn=document.getElementById('launchBtn');
  if(!btn)return;
  const orig=btn.innerHTML;
  btn.innerHTML=`<i class="fas fa-circle-notch spin-ic"></i>`;
  btn.disabled=true;
  rblxLaunchAt=Date.now();
  setTimeout(()=>{
    const f=document.createElement('iframe');
    f.style.display='none';f.src='roblox://';
    document.body.appendChild(f);setTimeout(()=>f.remove(),3000);
    showToast(t('tLaunch'),'#22c55e');
    setTimeout(()=>_setRblx(true),4000);
    btn.innerHTML=orig;btn.disabled=false;
  },800);
}

/* ─── FFLAGS ─── */
function ffInp(){
  lastFF=document.getElementById('fflags')?.value||'';
  const cc=document.getElementById('ccnt');
  if(cc)cc.textContent=lastFF.length+t('chars');
  const e=!lastFF.trim();
  document.getElementById('applyBtn')?.classList.toggle('dis',e);
  document.getElementById('stopBtn')?.classList.toggle('dis',e);
}

async function activateFF(){
  const c=(document.getElementById('fflags')?.value||'').trim();
  if(!c)return showToast(t('tNoFF'),'#ef4444');
  try{JSON.parse(c);}catch{return showToast(t('tBadJson'),'#ef4444');}

  const btn=document.getElementById('applyBtn');
  const orig=btn?.innerHTML||'';
  if(btn){btn.innerHTML=`<i class="fas fa-circle-notch spin-ic"></i>`;btn.style.opacity='.65';}
  await new Promise(r=>setTimeout(r,200));

  // Already have handle → write silently
  if(ffHandle){
    try{
      const w=await ffHandle.createWritable();
      await w.write(c);await w.close();
      if(btn){btn.innerHTML=orig;btn.style.opacity='';}
      showToast(t('tApplied'),accent);return;
    }catch{ffHandle=null;}
  }

  // First time – File System Access API
  if('showSaveFilePicker' in window){
    try{
      ffHandle=await window.showSaveFilePicker({
        suggestedName:'ClientAppSettings.json',
        startIn:'documents',
        types:[{description:'JSON',accept:{'application/json':['.json']}}]
      });
      const w=await ffHandle.createWritable();
      await w.write(c);await w.close();
      if(btn){btn.innerHTML=orig;btn.style.opacity='';}
      showToast(t('fSaved'),accent);
    }catch(e){
      ffHandle=null;
      if(btn){btn.innerHTML=orig;btn.style.opacity='';}
      if(e.name!=='AbortError')_copyFB(c);
    }
  }else{
    if(btn){btn.innerHTML=orig;btn.style.opacity='';}
    _copyFB(c);
  }
}

function _copyFB(c){
  navigator.clipboard.writeText(c)
    .then(()=>{showToast(t('tCopied'),accent);_guide();})
    .catch(()=>{showToast('❌ Copy failed','#ef4444');_guide();});
}

  document.getElementById('ffG')?.remove();

      </div>
    </div>`).join('');
  const m=document.createElement('div');
  m.style.cssText=`position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:9999`;
  m.innerHTML=`
    <div class="modal-anim" style="background:var(--panel);border:1.5px solid var(--border);border-radius:18px;padding:22px;width:480px;max-height:78vh;display:flex;flex-direction:column">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-size:16px;font-weight:700">📂 ${t('saved2')}</div>
        <button onclick="this.closest('[style*=inset]').remove()" style="background:none;border:none;color:#8b949e;font-size:18px;cursor:pointer">✕</button>
      </div>
      <div style="overflow-y:auto;display:flex;flex-direction:column;gap:7px">
        ${rows||`<div style="text-align:center;padding:28px;color:#8b949e">${t('noS')}</div>`}
      </div>
    </div>`;
  document.body.appendChild(m);
  m.onclick=e=>{if(e.target===m)m.remove();};
}
function loadCfg(i){
  const s=JSON.parse(localStorage.getItem('pxS')||'[]');
  lastFF=s[i].c;
  const ta=document.getElementById('fflags');if(ta)ta.value=lastFF;
  document.querySelector('[style*="inset:0"]')?.remove();
  ffInp();showToast(t('tLoaded'),accent);
}
function delCfg(i){
  const s=JSON.parse(localStorage.getItem('pxS')||'[]');
  s.splice(i,1);localStorage.setItem('pxS',JSON.stringify(s));
  document.querySelector('[style*="inset:0"]')?.remove();showSaved();
}

/* ─── SUPPORT / ADMIN ─── */
function openSupp(){
  if(!isAdm){showToast('🛟 Telegram: @PixieShopbot',accent);return;}
  render('admin');
}

/* ─── ADMIN PANEL ─── */
function _admin(){
  const on=Object.values(users).filter(u=>u.last_login&&(Date.now()-u.last_login)<600000).length;
  document.getElementById('app').innerHTML=`
    <div class="fade-up" style="background:var(--panel);border:1.5px solid var(--border);border-radius:20px;padding:22px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <button onclick="render('main')" class="btn" style="display:flex;align-items:center;gap:6px;background:var(--panel2);border:1.5px solid var(--border);border-radius:9px;padding:7px 12px;font-size:13px;color:${accent}">
          <i class="fas fa-arrow-left"></i> ${t('back')}
        </button>
        <div style="font-size:20px;font-weight:800">${t('adPanel')}</div>
        <div style="font-size:12px;color:#8b949e">${t('online')}: ${on} / ${t('total')}: ${Object.keys(users).length}</div>
      </div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px">
        <input id="srch" class="inp" placeholder="${t('srch')}" style="flex:1;min-width:180px" onkeyup="adminList()">
        <button onclick="adminList()" class="btn" style="padding:9px 13px;background:var(--panel2);border:1.5px solid var(--border);border-radius:10px;font-size:13px;color:#c9d1d9">↻</button>
        <button onclick="createProf()" class="btn" style="padding:9px 14px;background:#22c55e;color:#000;font-weight:700;border-radius:10px;border:none;font-size:12px">${t('newP')}</button>
        <button onclick="expUsers()" class="btn" style="padding:9px 14px;background:#1d4ed8;color:#fff;font-weight:700;border-radius:10px;border:none;font-size:12px">${t('exp')}</button>
      </div>
      <div id="aList" style="display:flex;flex-direction:column;gap:7px;max-height:500px;overflow-y:auto;padding-right:3px"></div>
    </div>`;
  adminList();
}

function adminList(){
  const c=document.getElementById('aList');if(!c)return;
  const q=(document.getElementById('srch')?.value||'').toLowerCase();
  const html=Object.keys(users).filter(n=>!q||n.toLowerCase().includes(q)).map(n=>{
    const u=users[n];
    const on=u.last_login&&(Date.now()-u.last_login)<600000;
    return `
      <div class="card" style="background:var(--panel2);border:1.5px solid var(--border);border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px">
        <div style="font-size:24px">${on?'🟢':'🔴'}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:2px">
            <span style="font-size:15px;font-weight:700">${n}</span>
            ${u.is_admin?`<span style="font-size:9px;font-weight:700;background:#f59e0b;color:#000;padding:1px 7px;border-radius:5px">ADMIN</span>`:''}
          </div>
          <div style="font-size:11px;color:#8b949e">${fmtT(u.last_login)} · ${(u.devices||[]).length}/${u.maxDevices||1} dev · ${fmtD(u.expiration)}</div>
        </div>
        <button onclick="cpPass('${n}')" class="btn" style="padding:6px 10px;background:var(--panel);border:1.5px solid var(--border);border-radius:8px;font-size:11px;color:#c9d1d9">📋</button>
        ${n!==curUser?`<button onclick="delU('${n}')" class="btn" style="padding:6px 10px;background:#ef4444;border-radius:8px;border:none;font-size:11px">🗑</button>`:''}
      </div>`;
  }).join('');
  c.innerHTML=html||`<div style="text-align:center;padding:28px;color:#8b949e">${t('noF')}</div>`;
}

function cpPass(n){navigator.clipboard.writeText(users[n].password);showToast(tf('pcopied',n),accent);}
function delU(n){
  if(confirm(tf('confDel',n))){delete users[n];saveUsers();adminList();showToast(tf('deleted',n),'#ef4444');}
}

/* ─── CREATE PROFILE ─── */
function createProf(){
  const m=document.createElement('div');
  m.style.cssText=`position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:9999`;
  m.innerHTML=`
    <div class="modal-anim" style="background:var(--panel);border:1.5px solid var(--border);border-radius:20px;padding:24px;width:400px">
      <div style="font-size:18px;font-weight:800;margin-bottom:16px;text-align:center">${t('cTitle')}</div>
      <input id="pN" class="inp" placeholder="${t('nick')}" style="margin-bottom:9px">
      <input id="pP" class="inp" type="password" placeholder="${t('pass')}" style="margin-bottom:9px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <label style="font-size:12px;color:#8b949e;flex:1">${t('maxD')}</label>
        <input id="pMD" type="number" value="1" min="1" max="999" class="inp" style="width:70px;text-align:center">
      </div>
      <!-- Toggle -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:2px 0">
        <span id="togL" style="font-size:13px;color:#c9d1d9">${t('togOn')}</span>
        <div id="pSw" class="sw on" onclick="togPerm()"><div class="sw-knob"></div></div>
      </div>
      <!-- Days slide -->
      <div id="dWrap" class="days-wrap">
        <label style="font-size:12px;color:#8b949e;display:block;margin-bottom:5px">${t('days')}</label>
        <input id="pD" type="number" value="30" min="1" class="inp">
      </div>
      <div style="display:flex;gap:9px;margin-top:16px">
        <button onclick="this.closest('[style*=inset]').remove()" class="btn"
          style="flex:1;padding:11px;background:var(--panel2);border:1.5px solid var(--border);border-radius:11px;font-size:13px;color:#c9d1d9">${t('cancel')}</button>
        <button onclick="confCreate()" class="btn"
          style="flex:1;padding:11px;background:#22c55e;color:#000;font-weight:700;border-radius:11px;border:none;font-size:13px">${t('create')}</button>
      </div>
    </div>`;
  document.body.appendChild(m);
  m.onclick=e=>{if(e.target===m)m.remove();};
}

function togPerm(){
  const sw=document.getElementById('pSw');
  const lbl=document.getElementById('togL');
  const wrap=document.getElementById('dWrap');
  if(!sw)return;
  const on=sw.classList.contains('on');
  sw.classList.toggle('on',!on);sw.classList.toggle('off',on);
  lbl.textContent=on?t('togOff'):t('togOn');
  wrap.classList.toggle('open',on);
}

function confCreate(){
  const n=document.getElementById('pN')?.value.trim();
  const p=document.getElementById('pP')?.value.trim();
  const md=parseInt(document.getElementById('pMD')?.value||'1')||1;
  const perm=document.getElementById('pSw')?.classList.contains('on');
  const d=perm?null:parseInt(document.getElementById('pD')?.value||'30');
  if(!n||!p)return alert(t('req'));
  if(users[n])return alert(t('taken'));
  users[n]={password:p,last_login:null,is_admin:false,expiration:d?Date.now()+d*86400000:null,maxDevices:md,devices:[]};
  saveUsers();
  document.querySelector('[style*="inset:0"]')?.remove();
  adminList();
  showToast(tf('created',n),accent);
}

/* ─── EXPORT ─── */
function expUsers(){
  let txt='═══════════════════════════════\n    Pixie FFlags — Users\n═══════════════════════════════\n\n';
  txt+=`Date: ${new Date().toLocaleString()}\nTotal: ${Object.keys(users).length}\n\n`;
  txt+='Nick         | Role   | Dev | Last Login              | Expires\n';
  txt+='──────────────────────────────────────────────────────────────────\n';
  Object.keys(users).forEach(n=>{
    const u=users[n];
    txt+=`${n.padEnd(12)} | ${(u.is_admin?'ADMIN ':'User  ')} | ${((u.devices||[]).length+'/'+u.maxDevices).padEnd(3)} | ${(u.last_login?new Date(u.last_login).toLocaleString():'Never').padEnd(23)} | ${fmtD(u.expiration)}\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain;charset=utf-8'}));
  a.download=`Pixie_Users_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  showToast(t('exported'),'#3b82f6');
}

/* ─── BOOT ─── */
saveUsers();applyAccent();applyBg();refreshLangBar();render('splash');
</script>
</body>
</html>
