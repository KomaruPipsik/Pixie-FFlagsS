<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixie FFlags</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap');
    :root{--bg:#0d1117;--panel:#161b22;--panel2:#1c2128;--border:#30363d;--accent:#e53535}
    *,*::before,*::after{box-sizing:border-box}
    html,body{height:100%;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:#e6edf3;overflow-x:hidden;min-height:100vh}

    @keyframes fadeUp  {from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeDn  {from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideR  {from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
    @keyframes mPop    {from{opacity:0;transform:scale(.9) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes tIn     {from{opacity:0;transform:scale(.82) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes tOut    {from{opacity:1}to{opacity:0;transform:scale(.88) translateY(6px)}}
    @keyframes spin    {to{transform:rotate(360deg)}}
    @keyframes pG      {0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}50%{box-shadow:0 0 0 6px rgba(34,197,94,0)}}
    @keyframes pR      {0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}
    @keyframes cPop    {from{transform:scale(.45)}to{transform:scale(1)}}
    @keyframes loadBar {from{width:0}to{width:100%}}
    @keyframes shimmer {0%{background-position:200% 0}100%{background-position:-200% 0}}

    .fu    {animation:fadeUp .38s ease both}
    .fu1   {animation:fadeUp .38s .07s ease both;opacity:0}
    .fu2   {animation:fadeUp .38s .14s ease both;opacity:0}
    .sr    {animation:slideR .36s ease both}
    .sr1   {animation:slideR .36s .09s ease both;opacity:0}
    .ma    {animation:mPop .28s cubic-bezier(.34,1.56,.64,1) both}
    .spin  {animation:spin .8s linear infinite;display:inline-block}
    .pg    {animation:pG 2s infinite}
    .pr    {animation:pR 2s infinite}
    .cp    {animation:cPop .16s ease both}

    .card{transition:transform .26s ease,box-shadow .26s ease}
    .card:hover{transform:translateY(-2px);box-shadow:0 14px 24px -8px rgba(0,0,0,.5)}

    .btn{transition:all .16s ease;cursor:pointer;border:none;background:none;color:inherit}
    .btn:hover{transform:scale(1.04)}
    .btn:active{transform:scale(.95)}
    .dis{opacity:.32!important;cursor:not-allowed!important;pointer-events:none!important}

    .inp{width:100%;background:var(--panel2);border:1.5px solid var(--border);border-radius:11px;
         padding:12px 15px;font-size:14px;color:#e6edf3;outline:none;font-family:inherit;
         transition:border-color .18s,box-shadow .18s}
    .inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 16%,transparent)}

    #fflags{width:100%;background:#0d1117;border:1.5px solid var(--border);border-radius:11px;
            padding:13px;font-family:'Fira Code','Courier New',monospace;font-size:12px;
            color:#c9d1d9;resize:none;outline:none;transition:border-color .18s,box-shadow .18s}
    #fflags:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 12%,transparent)}

    .sw{width:50px;height:26px;border-radius:13px;position:relative;cursor:pointer;flex-shrink:0;transition:background .3s ease}
    .sw-k{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;
          box-shadow:0 1px 4px rgba(0,0,0,.4);transition:transform .3s cubic-bezier(.4,0,.2,1)}
    .sw.on{background:#22c55e}.sw.off{background:#ef4444}
    .sw.on .sw-k{transform:translateX(24px)}.sw.off .sw-k{transform:translateX(0)}

    .dw{overflow:hidden;max-height:0;opacity:0;transition:max-height .34s ease,opacity .26s ease,margin-top .28s ease;margin-top:0}
    .dw.open{max-height:130px;opacity:1;margin-top:12px}

    /* Nick badge */
    .nb{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1.5px solid var(--border);
        border-radius:9px;padding:5px 10px;cursor:pointer;user-select:none;
        transition:border-color .18s,box-shadow .18s,transform .18s}
    .nb:hover{border-color:var(--accent);box-shadow:0 0 12px color-mix(in srgb,var(--accent) 24%,transparent);transform:scale(1.05)}

    /* Floating dropdown – fixed to avoid clipping */
    #accDrop{position:fixed;z-index:9000;background:var(--panel);border:1.5px solid var(--border);
             border-radius:13px;padding:14px;width:215px;box-shadow:0 14px 36px rgba(0,0,0,.65);
             animation:fadeDn .2s ease both}

    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#30363d;border-radius:99px}

    .lbtn{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;cursor:pointer;
          transition:all .15s ease;color:#8b949e;border:1.5px solid transparent;background:none}
    .lbtn.act{color:#e6edf3;border-color:var(--border);background:var(--panel2)}

    .bgp{display:flex;gap:2px;background:var(--panel2);border:1.5px solid var(--border);border-radius:7px;padding:2px}
    .bgp .bp{font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px;cursor:pointer;
             transition:all .15s ease;color:#8b949e;background:transparent;border:none}
    .bgp .bp.act{background:var(--border);color:#e6edf3}

    /* Frozen badge shimmer */
    .frozen-badge{background:linear-gradient(90deg,#1e40af,#3b82f6,#1e40af);background-size:200% 100%;
                  animation:shimmer 2s linear infinite;color:#fff;font-size:10px;font-weight:700;
                  padding:2px 8px;border-radius:6px}

    /* Expiry bar */
    .exp-bar{height:3px;border-radius:99px;background:var(--border);overflow:hidden;margin-top:4px}
    .exp-fill{height:100%;border-radius:99px;transition:width .3s ease}

    /* Apply overlay backdrop blur support */
    @supports not (backdrop-filter:blur(4px)){
      #applyOv{background:rgba(0,0,0,.82)!important}
    }

    /* Market card hover glow */
    #mktGrid .card:hover{
      border-color:var(--accent)!important;
      box-shadow:0 0 0 1px var(--accent), 0 14px 28px -8px rgba(0,0,0,.6)!important;
    }

    /* Timer pulse */
    @keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.55}}
    #timerCount{animation:timerPulse 1.8s ease-in-out infinite}

    /* Inp select fix */
    select.inp{cursor:pointer;appearance:auto}
  </style>
</head>

/* ═══════════ PALETTE (0 = Red) ═══════════ */
const PAL=[
  {ru:'Красная',     en:'Red',         c:'#e53535'},
  {ru:'Синяя',       en:'Blue',        c:'#1e90ff'},
  {ru:'Розовая',     en:'Pink',        c:'#ff69b4'},
  {ru:'Зелёная',     en:'Green',       c:'#00ff7f'},
  {ru:'Фиолетовая',  en:'Purple',      c:'#ba55d3'},
  {ru:'Оранжевая',   en:'Orange',      c:'#ff8c00'},
  {ru:'Бирюзовая',   en:'Teal',        c:'#40e0d0'},
  {ru:'Мятная',      en:'Mint',        c:'#00ffcc'},
  {ru:'Жёлтая',      en:'Yellow',      c:'#ffd700'},
  {ru:'Лайм',        en:'Lime',        c:'#aaff00'},
  {ru:'Ультрафиолет',en:'Ultraviolet', c:'#7b2ff7'},
  {ru:'Аквамарин',   en:'Aquamarine',  c:'#00d4ff'},
  {ru:'Коралл',      en:'Coral',       c:'#ff6b6b'},
  {ru:'Малиновая',   en:'Crimson',     c:'#e91e8c'},
  {ru:'Золотая',     en:'Gold',        c:'#ffc700'},
  {ru:'Тёмно-синяя', en:'Navy',        c:'#1a3aff'},
  {ru:'Серебряная',  en:'Silver',      c:'#b0b8c1'},
  {ru:'Белая',       en:'White',       c:'#f0f0f0'},
];
const BG={dark:'#0d1117',black:'#000000'};
const PANEL={dark:['#161b22','#1c2128'],black:['#0d0d0d','#141414']};
const GRACE_DAYS=2; // grace period before deletion after expiry

/* ═══════════ STATE ═══════════ */
let lang   = localStorage.getItem('pxL')||'en';
let cidx   = parseInt(localStorage.getItem('pxC')||'0');
let bgMode = localStorage.getItem('pxBG')||'dark';
let accent = PAL[cidx].c;

// Migrate + load users
function loadUsers(){
  let u=JSON.parse(localStorage.getItem('pixie_users')||'null');
  if(!u) u={
    Pixie:{password:'KP7224',      last_login:Date.now(),is_admin:true, expiration:null,maxDevices:1,devices:[]},
    Kuga: {password:'KKK7224f',    last_login:Date.now(),is_admin:true, expiration:null,maxDevices:1,devices:[]},
    Elka: {password:'pocxalka228', last_login:Date.now(),is_admin:true, expiration:null,maxDevices:1,devices:[]},
  };
  // migrate old accounts that may lack fields
  Object.keys(u).forEach(n=>{
    if(u[n].is_admin){u[n].maxDevices=1; u[n].devices=u[n].devices||[];}
    else{u[n].maxDevices=u[n].maxDevices||1; u[n].devices=u[n].devices||[];}
  });
  return u;
}
let users=loadUsers();
let curUser=null,isAdm=false,lastFF='';
let ffDir=null; // FileSystemDirectoryHandle (session only)
let rblxFail=0,rblxLaunchAt=0,rblxRunning=null,rblxIv=null;
let rblxManualStatus=null; // null | true | false — set by user manually
let timerIv=null;
let _toast=null;

/* ═══════════ HELPERS ═══════════ */
const t  = k=>(S[lang]||S.en)[k]||(S.en[k]||k);
const tf = (k,...a)=>{const fn=(S[lang]||S.en)[k];return typeof fn==='function'?fn(...a):(fn||k);};
const pn = ()=>PAL[cidx][lang]||PAL[cidx].ru;
const isLt=c=>['#f0f0f0','#ffd700','#aaff00','#b0b8c1','#00ff7f','#00ffcc','#40e0d0'].includes(c);
const acFg=()=>isLt(accent)?'#000':'#fff';
const now =()=>Date.now();

function saveUsers(){
  // Don't auto-delete here — handle gracePeriod separately
  localStorage.setItem('pixie_users',JSON.stringify(users));
}
function savePref(){localStorage.setItem('pxL',lang);localStorage.setItem('pxC',String(cidx));localStorage.setItem('pxBG',bgMode);}
function applyAccent(){accent=PAL[cidx].c;document.documentElement.style.setProperty('--accent',accent);}
function applyBg(){
  document.body.style.background=BG[bgMode];
  document.documentElement.style.setProperty('--bg',BG[bgMode]);
  const[p,p2]=PANEL[bgMode];
  document.documentElement.style.setProperty('--panel',p);
  document.documentElement.style.setProperty('--panel2',p2);
}
function rlb(){
  document.getElementById('lEn')?.classList.toggle('act',lang==='en');
  document.getElementById('lRu')?.classList.toggle('act',lang==='ru');
}
function setLang(l){lang=l;savePref();render(_scr);}

function getDevId(){
  let d=localStorage.getItem('pxDid');
  if(d)return d;
  try{
    const cv=document.createElement('canvas'),cx=cv.getContext('2d');
    cx.font='12px Arial';cx.fillText('pf',2,2);
    const raw=[navigator.userAgent,navigator.language,screen.width+'x'+screen.height,
               new Date().getTimezoneOffset(),navigator.hardwareConcurrency||0,cv.toDataURL().slice(-14)].join('|');
    let h=5381;for(let i=0;i<raw.length;i++){h=((h<<5)+h)+raw.charCodeAt(i);h=h&h;}
    d=Math.abs(h).toString(36);
  }catch{d='d'+Math.random().toString(36).slice(2,10);}
  localStorage.setItem('pxDid',d);return d;
}

/* check if account is in grace period (expired but not deleted yet) */
function isFrozen(u){
  if(!u.expiration||u.expiration>now())return false;
  const grace=u.expiration+GRACE_DAYS*86400000;
  return now()<grace;
}
function isDeleted(u){
  if(!u.expiration)return false;
  return now()>=u.expiration+GRACE_DAYS*86400000;
}
function graceDaysLeft(u){
  if(!u.expiration)return null;
  const grace=u.expiration+GRACE_DAYS*86400000;
  return Math.max(0,Math.ceil((grace-now())/86400000));
}
function daysLeft(u){
  if(!u.expiration)return null;
  return Math.max(0,Math.ceil((u.expiration-now())/86400000));
}

/* prune truly deleted accounts on boot */
function pruneUsers(){
  let changed=false;
  Object.keys(users).forEach(n=>{
    if(isDeleted(users[n])){delete users[n];changed=true;}
  });
  if(changed)saveUsers();
}

function fmtT(ts){
  if(!ts)return t('never');
  const m=Math.floor((now()-ts)/60000);
  return m<1?t('now'):m<60?tf('mago',m):tf('hago',Math.floor(m/60));
}
function fmtD(ts){
  if(!ts)return t('perm');
  return new Date(ts).toLocaleString(lang==='ru'?'ru-RU':'en-US',{dateStyle:'short',timeStyle:'short'});
}

/* toast */
function showToast(txt,col){
  if(_toast){
    clearTimeout(_toast._t);
    _toast.style.animation='tOut .2s ease forwards';
    const old=_toast;setTimeout(()=>old.remove(),220);_toast=null;
  }
  setTimeout(()=>{
    const el=document.createElement('div');
    el.style.cssText=`position:fixed;bottom:50px;right:14px;z-index:9999;padding:10px 15px;
      border-radius:11px;font-size:12.5px;font-weight:500;display:flex;align-items:center;gap:7px;
      max-width:290px;word-break:break-word;background:var(--panel);border:2px solid ${col};color:${col};
      box-shadow:0 6px 22px rgba(0,0,0,.5);animation:tIn .32s cubic-bezier(.34,1.56,.64,1) both`;
    el.innerHTML=txt;document.body.appendChild(el);_toast=el;
    el._t=setTimeout(()=>{el.style.animation='tOut .25s ease forwards';setTimeout(()=>{el.remove();if(_toast===el)_toast=null;},260);},3400);
  },_toast?240:0);
}

  if(timerIv){clearInterval(timerIv);timerIv=null;}
  document.getElementById('app').innerHTML='';

  else if(s==='adminFrz')_admin('frozen');

}

/* ─── ACCOUNT DROPDOWN (fixed position, can't be clipped) ─── */
function toggleDrop(e){
  e.stopPropagation();
  const ex=document.getElementById('accDrop');
  if(ex){ex.remove();return;}
  const badge=document.getElementById('nBadge');
  const rect=badge.getBoundingClientRect();
  const u=users[curUser]||{};
  const dl=daysLeft(u);

  const d=document.createElement('div');
  d.id='accDrop';
  // position below badge, right-aligned
  d.style.top=(rect.bottom+6)+'px';
  d.style.left=Math.max(8,rect.right-215)+'px';
  d.onclick=ev=>ev.stopPropagation();
  d.className=''; // acc-drop is applied via id style
  d.style.cssText+=`position:fixed;z-index:9000;background:var(--panel);border:1.5px solid var(--border);
    border-radius:13px;padding:14px;width:215px;box-shadow:0 14px 36px rgba(0,0,0,.65);
    animation:fadeDn .2s ease both;top:${rect.bottom+6}px;left:${Math.max(8,rect.right-215)}px`;
  d.innerHTML=`
    <div style="font-size:13px;font-weight:700;margin-bottom:10px">${t('accInfo')}</div>

      <div><span style="color:#484f58">${t('devs')}: </span>${(u.devices||[]).length}/${u.maxDevices||1}</div>
    </div>
    <button onclick="doLogout()" class="btn" style="margin-top:11px;width:100%;padding:7px;
      background:#ef444415;border:1.5px solid #ef4444;border-radius:9px;color:#ef4444;font-size:12px;font-weight:600">
      <i class="fas fa-sign-out-alt" style="margin-right:4px"></i>${t('logout')}

/* ─── COLOUR / BG ─── */
function shiftC(dir){
  cidx=(cidx+dir+PAL.length)%PAL.length;
  accent=PAL[cidx].c;savePref();applyAccent();

  // Update all title elements without re-render
  ['splashTitle','wTitle','mainTitle'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.style.color=accent;
  });
  ['wDot','mDot'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.style.background=accent;el.classList.remove('cp');void el.offsetWidth;el.classList.add('cp');}
  });
  ['wNm','mNm'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=pn();});
  const ab=document.getElementById('applyBtn');
  if(ab){ab.style.background=accent;ab.style.color=acFg();}
  const lb=document.getElementById('launchBtn');
  if(lb)lb.style.background=`linear-gradient(135deg,#7c3aed,${accent})`;
  const loginBtn=document.getElementById('loginBtn');
  if(loginBtn){loginBtn.style.background=accent;loginBtn.style.color=acFg();}
  showToast(t('tThm')+pn(),accent);
}

function setBg(m){
  bgMode=m;savePref();applyBg();
  document.querySelectorAll('.bp').forEach(b=>{
    b.classList.toggle('act',(m==='dark'&&b.textContent===t('bgD'))||(m==='black'&&b.textContent===t('bgB')));
  });
  showToast(t('tBg'),accent);
}

/* ─── LOGIN ─── */
function doLogin(){
  const nick=(document.getElementById('iN')?.value||'').trim();
  const pass=(document.getElementById('iP')?.value||'').trim();
  if(!nick||!pass)return showToast(t('tCreds'),'#ef4444');

  // New user auto-create
  if(!users[nick]){
    users[nick]={password:pass,last_login:now(),is_admin:false,expiration:null,maxDevices:1,devices:[]};
    saveUsers();
  }
  const u=users[nick];
  if(u.password!==pass)return showToast(t('tWrong'),'#ef4444');

  // Frozen check
  if(isFrozen(u)){
    const d=graceDaysLeft(u);
    showModal(`❄️`,tf('frzMsg',nick,d),null,null,true);
    return;
  }
  if(isDeleted(u))return showToast(t('tExp'),'#ef4444');

  // Device check
  const did=getDevId();
  if(!u.devices.includes(did)){
    if(u.devices.length>=u.maxDevices)return showToast(t('tDevLim'),'#ef4444');
    u.devices.push(did);
  }
  u.last_login=now();
  saveUsers();
  curUser=nick;isAdm=u.is_admin;
  render('main');

  const af=JSON.parse(localStorage.getItem('pxAuto')||'null');
  if(!af||(af.n!==nick))setTimeout(()=>askSave(nick,pass),700);
}

/* ═══════════════════════════════════════
   APPLY FFLAGS — Directory Picker (most automatic possible from web)
   Flow: 1st time → user picks Roblox version folder → we write ClientAppSettings.json
         next times → write silently, no dialog
   ═══════════════════════════════════════ */
function ffInp(){
  lastFF=document.getElementById('fflags')?.value||'';
  const cc=document.getElementById('ccnt');if(cc)cc.textContent=lastFF.length+t('chars');
  const e=!lastFF.trim();

  document.getElementById('stopBtn')?.classList.toggle('dis',e);

/* ── Animated APPLY overlay ── */
function _showApplyOverlay(){
  const ov=document.createElement('div');
  ov.id='applyOv';
  ov.style.cssText=`position:fixed;inset:0;z-index:9995;display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.55);backdrop-filter:blur(4px);animation:fadeUp .2s ease both`;
  ov.innerHTML=`
    <div id="applyCard" style="background:var(--panel);border:1.5px solid var(--border);border-radius:20px;
      padding:32px 40px;text-align:center;min-width:220px;box-shadow:0 20px 50px rgba(0,0,0,.7);
      animation:mPop .3s cubic-bezier(.34,1.56,.64,1) both">
      <div id="applyIcon" style="font-size:38px;margin-bottom:12px">
        <i class="fas fa-circle-notch spin" style="color:${accent}"></i>
      </div>
      <div id="applyLabel" style="font-size:17px;font-weight:700;color:#e6edf3">
        ${lang==='ru'?'Подождите…':'Please wait…'}
      </div>
      <div id="applySubLabel" style="font-size:12px;color:#8b949e;margin-top:5px">
        ${lang==='ru'?'Применяем FFlags…':'Applying FFlags…'}
      </div>
    </div>`;
  document.body.appendChild(ov);
  return ov;
}

function _applyDone(ov, success){
  const icon=document.getElementById('applyIcon');
  const lbl=document.getElementById('applyLabel');
  const sub=document.getElementById('applySubLabel');
  if(icon) icon.innerHTML=success
    ?`<span style="color:#22c55e;font-size:42px;animation:mPop .35s cubic-bezier(.34,1.56,.64,1) both">✅</span>`
    :`<span style="color:#ef4444;font-size:42px;animation:mPop .35s cubic-bezier(.34,1.56,.64,1) both">❌</span>`;
  if(lbl) lbl.textContent=success?(lang==='ru'?'Готово!':'Done!'):(lang==='ru'?'Ошибка':'Error');
  if(sub) sub.textContent=success
    ?(lang==='ru'?'Перезапусти Roblox для применения':'Restart Roblox to apply changes')
    :(lang==='ru'?'Попробуй снова':'Try again');
  setTimeout(()=>{
    if(ov){ov.style.transition='opacity .4s ease';ov.style.opacity='0';setTimeout(()=>ov?.remove(),420);}
  },1600);
}

async function activateFF(){
  const c=(document.getElementById('fflags')?.value||'').trim();
  if(!c)return showToast(t('tNoFF'),'#ef4444');
  try{JSON.parse(c);}catch{return showToast(t('tBadJ'),'#ef4444');}

  // If we already have a directory handle — write fully silently with overlay only
  if(ffDir){
    const ov=_showApplyOverlay();
    await new Promise(r=>setTimeout(r,400)); // feel of "doing something"
    try{
      const fh=await ffDir.getFileHandle('ClientAppSettings.json',{create:true});
      const w=await fh.createWritable();await w.write(c);await w.close();
      _applyDone(ov,true);return;
    }catch{ffDir=null;_applyDone(ov,false);}
    return;
  }

  // First time — show picker instructions (no overlay yet, user must interact)
  if('showDirectoryPicker' in window){
    mkModal(`
      <div style="font-size:15px;font-weight:700;margin-bottom:10px;color:${accent}">${t('fPick')}</div>
      <div style="font-size:11.5px;color:#8b949e;line-height:1.7;margin-bottom:16px;white-space:pre-line">${t('dirInstr')}</div>
      <div style="display:flex;gap:8px">
        <button onclick="closeTopModal()" class="btn" style="flex:1;padding:10px;background:var(--panel2);border:1.5px solid var(--border);border-radius:10px;font-size:12px;color:#8b949e">${t('cancel')}</button>
        <button id="_pickBtn" class="btn" style="flex:1;padding:10px;background:${accent};color:${acFg()};font-weight:700;border-radius:10px;border:none;font-size:12px">OK →</button>
      </div>`);
    document.getElementById('_pickBtn').onclick=async()=>{
      closeTopModal();
      const ov=_showApplyOverlay();
      await new Promise(r=>setTimeout(r,200));
      try{
        ffDir=await window.showDirectoryPicker({mode:'readwrite',startIn:'documents'});
        const fh=await ffDir.getFileHandle('ClientAppSettings.json',{create:true});
        const w=await fh.createWritable();await w.write(c);await w.close();
        _applyDone(ov,true);
        // next time show it knows folder
        setTimeout(()=>showToast(t('fSvd'),accent),2200);
      }catch(e2){
        ffDir=null;
        if(e2.name==='AbortError'){ov?.remove();}
        else{_applyDone(ov,false);setTimeout(()=>_copyFB(c),2200);}
      }
    };
  }else if('showSaveFilePicker' in window){
    const ov=_showApplyOverlay();
    await new Promise(r=>setTimeout(r,200));
    try{
      const fh=await window.showSaveFilePicker({suggestedName:'ClientAppSettings.json',startIn:'documents',types:[{description:'JSON',accept:{'application/json':['.json']}}]});
      const w=await fh.createWritable();await w.write(c);await w.close();
      _applyDone(ov,true);
    }catch(e3){
      if(e3.name==='AbortError'){ov?.remove();}
      else{_applyDone(ov,false);setTimeout(()=>_copyFB(c),2200);}
    }
  }else{
    // No FS API — clipboard fallback with overlay
    const ov=_showApplyOverlay();
    await new Promise(r=>setTimeout(r,900));
    await navigator.clipboard.writeText(c).catch(()=>{});
    _applyDone(ov,true);
    setTimeout(()=>showToast(t('tCopy'),accent),2200);
  }
}

function _copyFB(c){
  navigator.clipboard.writeText(c)
    .then(()=>{showToast(t('tCopy'),accent);})
    .catch(()=>showToast(t('fErr'),'#ef4444'));
}

function fmtFF(){
  const ta=document.getElementById('fflags');if(!ta?.value.trim())return;
  try{ta.value=JSON.stringify(JSON.parse(ta.value),null,2);lastFF=ta.value;ffInp();showToast('✅ Formatted',accent);}
  catch{showToast(t('tBadJ'),'#ef4444');}
}

function stopFF(){

function extendUser(n){
  mkModal(`
    <div style="font-size:15px;font-weight:700;margin-bottom:10px">${t('extend')}: <span style="color:${accent}">${n}</span></div>
    <label style="font-size:12px;color:#8b949e;display:block;margin-bottom:5px">${t('extDays')}</label>
    <input id="exD" type="number" value="30" min="1" class="inp" style="margin-bottom:12px" onkeydown="if(event.key==='Enter')extConfirm('${n}')">
    <div style="display:flex;gap:8px">
      <button onclick="closeTopModal()" class="btn" style="flex:1;padding:9px;background:var(--panel2);border:1.5px solid var(--border);border-radius:9px;font-size:12px;color:#c9d1d9">${t('cancel')}</button>
      <button onclick="extConfirm('${n}')" class="btn" style="flex:1;padding:9px;background:#22c55e;color:#000;font-weight:700;border-radius:9px;border:none;font-size:12px">${t('extend')}</button>
    </div>`);
  setTimeout(()=>{const el=document.getElementById('exD');el?.focus();el?.select();},80);
}
function extConfirm(n){
  const d=parseInt(document.getElementById('exD')?.value||'30');if(!d||d<1)return;
  const u=users[n];if(!u)return;
  const base=Math.max(now(),u.expiration||now());
  u.expiration=base+d*86400000;
  saveUsers();closeTopModal();
  showToast(tf('extDone',n),accent);
  adminList();frozenList();
  // Refresh tab counts
  const tab=document.getElementById('tabFrz');
  if(tab&&tab.style.display!=='none')frozenList();else adminList();
}

function cpPass(n){navigator.clipboard.writeText(users[n].password);showToast(tf('pcp',n),accent);}

function freezeUser(n){
  const u=users[n];if(!u||u.is_admin)return;
  if(!confirm(lang==='ru'?`Заморозить аккаунт "${n}" на 2 дня?`:`Freeze account "${n}" for 2 days?`))return;
  // Set expiration to right now — grace period of 2 days starts immediately
  u.expiration=now();
  saveUsers();
  showToast(lang==='ru'?`❄️ ${n} заморожен на 2 дня`:`❄️ ${n} frozen for 2 days`,'#3b82f6');
  adminList();frozenList();
  // Update frozen tab badge count
  _admin('users');
}
function delU(n){
  if(confirm(tf('confDel',n))){delete users[n];saveUsers();adminList();frozenList();showToast(tf('deleted',n),'#ef4444');}
}

/* ─── CREATE PROFILE ─── */
function createProf(){
  mkModal(`
    <div style="font-size:17px;font-weight:800;margin-bottom:14px;text-align:center">${t('cTit')}</div>
    <input id="pN" class="inp" placeholder="${t('nick')}" style="margin-bottom:8px">
    <input id="pP" class="inp" type="password" placeholder="${t('pass')}" style="margin-bottom:8px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <label style="font-size:12px;color:#8b949e;flex:1">${t('maxD')}</label>
      <input id="pMD" type="number" value="1" min="1" max="999" class="inp" style="width:65px;text-align:center">
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:2px 0">
      <span id="togL" style="font-size:12.5px;color:#c9d1d9">${t('togOn')}</span>
      <div id="pSw" class="sw on" onclick="togPerm()"><div class="sw-k"></div></div>
    </div>
    <div id="dWrap" class="dw">
      <label style="font-size:12px;color:#8b949e;display:block;margin-bottom:5px">${t('days')}</label>
      <input id="pD" type="number" value="30" min="1" class="inp">
    </div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button onclick="closeTopModal()" class="btn" style="flex:1;padding:10px;background:var(--panel2);border:1.5px solid var(--border);border-radius:10px;font-size:12.5px;color:#c9d1d9">${t('cancel')}</button>
      <button onclick="confCreate()" class="btn" style="flex:1;padding:10px;background:#22c55e;color:#000;font-weight:700;border-radius:10px;border:none;font-size:12.5px">${t('create')}</button>
    </div>`,400);
}
function togPerm(){
  const sw=document.getElementById('pSw'),lbl=document.getElementById('togL'),wrap=document.getElementById('dWrap');
  if(!sw)return;
  const on=sw.classList.contains('on');
  sw.classList.toggle('on',!on);sw.classList.toggle('off',on);
  lbl.textContent=on?t('togOff'):t('togOn');
  wrap.classList.toggle('open',on);
}
function confCreate(){
  const n=document.getElementById('pN')?.value.trim();
  const p=document.getElementById('pP')?.value.trim();
  const md=parseInt(document.getElementById('pMD')?.value||'1')||1;
  const perm=document.getElementById('pSw')?.classList.contains('on');
  const d=perm?null:parseInt(document.getElementById('pD')?.value||'30');
  if(!n||!p)return alert(t('req'));
  if(users[n])return alert(t('taken'));
  users[n]={password:p,last_login:null,is_admin:false,expiration:d?now()+d*86400000:null,maxDevices:md,devices:[]};
  saveUsers();
  closeTopModal();
  // Re-render admin panel to update counts
  _admin('users');
  showToast(tf('created',n),accent);
}

/* ─── EXPORT ─── */
function expUsers(){
  let txt='═══════════════════════════\n    Pixie FFlags — Users\n═══════════════════════════\n\n';
  txt+=`Date: ${new Date().toLocaleString()}\nTotal: ${Object.keys(users).length}\n\n`;
  Object.keys(users).forEach(n=>{
    const u=users[n];
    const frz=isFrozen(u)?'[FROZEN] ':'';
    txt+=`${frz}${n} | ${u.is_admin?'ADMIN':'User'} | ${(u.devices||[]).length}/${u.maxDevices} dev | ${fmtD(u.expiration)}\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain;charset=utf-8'}));
  a.download=`Pixie_Users_${new Date().toISOString().slice(0,10)}.txt`;a.click();
  showToast(t('exported'),'#3b82f6');
}

/* ═══════════════════════════════════════
   🛒  MARKET
   ═══════════════════════════════════════
   Data stored in localStorage 'pxMkt' as array of:
   {id, title, desc, tags, content, author, date, downloads}
═══════════════════════════════════════ */
function mktLoad(){return JSON.parse(localStorage.getItem('pxMkt')||'[]');}
function mktSave(arr){localStorage.setItem('pxMkt',JSON.stringify(arr));}
function mktId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function _market(){
  document.getElementById('app').innerHTML=`
    <div class="fu">
      <!-- HEADER -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
        <button onclick="render('main')" class="btn" style="display:flex;align-items:center;gap:5px;background:var(--panel2);border:1.5px solid var(--border);border-radius:8px;padding:6px 11px;font-size:12.5px;color:${accent}">
          <i class="fas fa-arrow-left"></i>${t('back')}
        </button>
        <h2 style="font-size:20px;font-weight:800;margin:0;flex:1">🛒 ${t('mktTitle')}</h2>
        <button onclick="_openPublishModal()" class="btn"
          style="padding:8px 14px;background:${accent};color:${acFg()};font-weight:700;font-size:12px;border-radius:9px;border:none;display:flex;align-items:center;gap:5px">
          <i class="fas fa-plus"></i>${t('mktPublish')}
        </button>
      </div>

      <!-- FILTERS ROW -->
      <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;align-items:center">
        <input id="mktQ" class="inp" placeholder="${t('mktSearch')}" style="flex:1;min-width:160px" oninput="mktRender()">
        <select id="mktSort" class="inp" style="width:150px" onchange="mktRender()">
          <option value="dl">${t('mktSortDl')}</option>
          <option value="new">${t('mktSortNew')}</option>
          <option value="az">${t('mktSortAZ')}</option>
        </select>
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:#8b949e;cursor:pointer;white-space:nowrap">
          <input type="checkbox" id="mktMine" onchange="mktRender()" style="accent-color:${accent}">
          ${t('mktMyOnly')}
        </label>
      </div>

      <!-- CARDS GRID -->
      <div id="mktGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px"></div>
    </div>`;
  mktRender();
}

function mktRender(){
  const q=(document.getElementById('mktQ')?.value||'').toLowerCase();
  const sort=document.getElementById('mktSort')?.value||'dl';
  const mineOnly=document.getElementById('mktMine')?.checked||false;

  let arr=mktLoad();
  if(q) arr=arr.filter(x=>x.title.toLowerCase().includes(q)||x.desc.toLowerCase().includes(q)||(x.tags||'').toLowerCase().includes(q));
  if(mineOnly) arr=arr.filter(x=>x.author===curUser);
  if(sort==='dl') arr.sort((a,b)=>b.downloads-a.downloads);
  else if(sort==='new') arr.sort((a,b)=>b.date-a.date);
  else arr.sort((a,b)=>a.title.localeCompare(b.title));

  const grid=document.getElementById('mktGrid');if(!grid)return;

  if(!arr.length){
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:40px;color:#8b949e;font-size:14px">
      ${q||mineOnly?t('mktNoRes'):t('mktEmpty')}
    </div>`;
    return;
  }

  grid.innerHTML=arr.map(x=>{
    const ago=_mktAgo(x.date);
    const tags=(x.tags||'').split(',').filter(Boolean).map(tg=>`<span style="font-size:9px;background:var(--border);padding:2px 7px;border-radius:99px;color:#8b949e">${tg.trim()}</span>`).join('');
    const isOwn=x.author===curUser||isAdm;
    return `
      <div class="card" style="background:var(--panel);border:1.5px solid var(--border);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:9px">
        <!-- Top -->
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">
          <div style="min-width:0;flex:1">
            <div style="font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${x.title}</div>
            <div style="font-size:10.5px;color:#8b949e;margin-top:2px">${t('mktBy')} <span style="color:${accent};font-weight:600">${x.author}</span> · ${ago}</div>
          </div>
          <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
            <i class="fas fa-download" style="font-size:10px;color:#8b949e"></i>
            <span style="font-size:12px;font-weight:700;color:#e6edf3">${x.downloads}</span>
          </div>
        </div>
        <!-- Desc -->
        ${x.desc?`<div style="font-size:12px;color:#8b949e;line-height:1.55;max-height:52px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical">${x.desc}</div>`:''}
        <!-- Tags -->
        ${tags?`<div style="display:flex;flex-wrap:wrap;gap:4px">${tags}</div>`:''}
        <!-- JSON preview -->
        <div style="background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:8px;font-family:'Fira Code',monospace;font-size:10.5px;color:#8b949e;max-height:64px;overflow:hidden;text-overflow:ellipsis;white-space:pre;line-height:1.45">${_escHtml(x.content.slice(0,200))}${x.content.length>200?'\n…':''}</div>
        <!-- Actions -->
        <div style="display:flex;gap:6px;margin-top:2px">
          <button onclick="mktDownload('${x.id}')" class="btn" style="flex:1;padding:8px;background:${accent};color:${acFg()};font-weight:700;font-size:12px;border-radius:8px;border:none">
            <i class="fas fa-download" style="margin-right:4px"></i>${t('mktLoad')}
          </button>
          ${isOwn?`<button onclick="mktDelete('${x.id}')" class="btn" style="padding:8px 10px;background:#ef444415;border:1.5px solid #ef4444;border-radius:8px;font-size:12px;color:#ef4444">🗑</button>`:''}
        </div>
      </div>`;
  }).join('');
}

function mktDownload(id){
  const arr=mktLoad();
  const idx=arr.findIndex(x=>x.id===id);
  if(idx<0)return;
  arr[idx].downloads++;
  mktSave(arr);
  // Load into editor
  lastFF=arr[idx].content;
  render('main');
  setTimeout(()=>{
    const ta=document.getElementById('fflags');
    if(ta){ta.value=lastFF;ffInp();}
    showToast(t('mktLoaded'),accent);
  },400);
}

function mktDelete(id){
  if(!confirm(t('mktConfDel')))return;
  const arr=mktLoad().filter(x=>x.id!==id);
  mktSave(arr);
  mktRender();
  showToast(t('mktDeleted'),'#ef4444');
}

function _openPublishModal(prefillTitle='',prefillContent=''){
  // Use current editor content if no prefill
  const edContent=document.getElementById('fflags')?.value.trim()||'';
  const defContent=prefillContent||edContent;
  mkModal(`
    <div style="font-size:16px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:7px">
      <i class="fas fa-upload" style="color:${accent}"></i>${t('mktPubTitle')}
    </div>
    <input id="mPT" class="inp" placeholder="${t('mktName')}" value="${_escAtt(prefillTitle)}" style="margin-bottom:8px">
    <textarea id="mPD" class="inp" placeholder="${t('mktDesc')}" rows="3"
      style="resize:none;font-size:13px;margin-bottom:8px;line-height:1.5"></textarea>
    <input id="mPTg" class="inp" placeholder="${t('mktTags')} — fps, graphics, ping" style="margin-bottom:8px">
    <textarea id="mPC" class="inp" placeholder='{"FFlagDebugDisplayFPS":"True"}' rows="4"
      style="resize:none;font-family:\'Fira Code\',monospace;font-size:11.5px;margin-bottom:12px;line-height:1.5">${_escHtml(defContent)}</textarea>
    <div style="display:flex;gap:8px">
      <button onclick="closeTopModal()" class="btn"
        style="flex:1;padding:10px;background:var(--panel2);border:1.5px solid var(--border);border-radius:10px;font-size:12.5px;color:#c9d1d9">${t('mktCancel')}</button>
      <button onclick="mktPublish()" class="btn"
        style="flex:1;padding:10px;background:${accent};color:${acFg()};font-weight:700;border-radius:10px;border:none;font-size:12.5px">
        <i class="fas fa-rocket" style="margin-right:4px"></i>${t('mktPubBtn')}
      </button>
    </div>`,480);
  setTimeout(()=>document.getElementById('mPT')?.focus(),80);
}

function mktPublish(){
  const title=document.getElementById('mPT')?.value.trim();
  const desc=document.getElementById('mPD')?.value.trim()||'';
  const tags=document.getElementById('mPTg')?.value.trim()||'';
  const content=document.getElementById('mPC')?.value.trim();
  if(!title)return showToast('❌ '+(lang==='ru'?'Введи название':'Enter a title'),'#ef4444');
  if(!content)return showToast('❌ '+(lang==='ru'?'Введи FFlag JSON':'Enter FFlag JSON'),'#ef4444');
  try{JSON.parse(content);}catch{return showToast(t('tBadJ'),'#ef4444');}

  const arr=mktLoad();
  arr.push({id:mktId(),title,desc,tags,content,author:curUser,date:Date.now(),downloads:0});
  mktSave(arr);
  closeTopModal();
  showToast(t('mktPublished'),accent);
  // If currently on market screen, refresh
  if(_scr==='market') mktRender();
}

function _mktAgo(ts){
  const m=Math.floor((now()-ts)/60000);
  return m<1?t('now'):m<60?tf('mago',m):m<1440?tf('hago',Math.floor(m/60)):new Date(ts).toLocaleDateString(lang==='ru'?'ru-RU':'en-US');
}
function _escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function _escAtt(s){return s.replace(/"/g,'&quot;');}

/* ════════════ BOOT ════════════ */
pruneUsers();applyAccent();applyBg();rlb();render('splash');
</script>
</body>
