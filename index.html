<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixie FFlags</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-4px); box-shadow: 0 25px 30px -10px rgb(0 255 204 / 0.2); }
    .toast { animation: toastIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    @keyframes toastIn { 0% { transform: scale(0.8) translateY(30px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
    .modal { animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    @keyframes modalPop { 0% { transform: scale(0.9) translateY(20px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
    .btn-hover { transition: all 0.2s ease; }
    .btn-hover:hover { transform: scale(1.05); }
    .gradient-btn { background: linear-gradient(135deg, #f8f8f8 0%, var(--accent-color) 100%); color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
    .disabled-btn { opacity: 0.4 !important; cursor: not-allowed !important; pointer-events: none !important; }
    .toggle { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen overflow-hidden">

  <div id="app" class="max-w-[920px] mx-auto p-6"></div>

  <script>
    let users = JSON.parse(localStorage.getItem('pixie_users')) || {
      "Pixie": { password: "KP7224", last_login: Date.now(), is_admin: true, expiration: null },
      "Kuga": { password: "KKK7224f", last_login: Date.now(), is_admin: true, expiration: null },
      "Elka": { password: "pocxalka228", last_login: Date.now(), is_admin: true, expiration: null }
    };
    let currentUser = null;
    let isAdmin = false;
    let accent = localStorage.getItem('pixie_accent') || "#00ffcc";
    let lastFFlags = "";

    const saveUsers = () => {
      const now = Date.now();
      Object.keys(users).forEach(nick => {
        if (users[nick].expiration && users[nick].expiration < now) delete users[nick];
      });
      localStorage.setItem('pixie_users', JSON.stringify(users));
    };

    function render(screen) {
      const app = document.getElementById('app');
      app.innerHTML = '';

      if (screen === 'splash') {
        app.innerHTML = `
          <div class="h-screen flex flex-col items-center justify-center bg-[#0a0a0a]">
            <div class="text-center animate-pulse">
              <h1 class="text-7xl font-bold mb-6 tracking-tighter" style="color:${accent}">Pixie FFlags</h1>
              <p class="text-2xl text-gray-400 flex items-center justify-center gap-2">Подождите, запускаемся<span id="dots" class="inline-block w-6"></span></p>
            </div>
          </div>`;
        let i = 0;
        const interval = setInterval(() => {
          document.getElementById('dots').innerHTML = '.'.repeat((i++ % 4) + 1);
          if (i > 16) { clearInterval(interval); render('welcome'); }
        }, 180);
        return;
      }

      if (screen === 'welcome') {
        app.innerHTML = `
          <div class="bg-[#111111] rounded-3xl p-12 max-w-[620px] mx-auto mt-24 shadow-2xl">
            <h1 class="text-4xl font-bold text-center mb-12">Добро пожаловать в Pixie FFlags</h1>
            <input id="nick" placeholder="Ник" class="w-full bg-[#1f1f1f] rounded-3xl px-8 py-6 text-2xl mb-6 outline-none focus:ring-2 focus:ring-[${accent}] transition-all">
            <input id="pass" type="password" placeholder="Пароль" class="w-full bg-[#1f1f1f] rounded-3xl px-8 py-6 text-2xl mb-10 outline-none focus:ring-2 focus:ring-[${accent}] transition-all">
            <button onclick="login()" class="w-full bg-[${accent}] hover:brightness-110 text-black font-bold text-2xl py-6 rounded-3xl btn-hover">Войти</button>
            <button onclick="openThemeModal()" class="absolute top-10 right-10 text-4xl hover:scale-110 transition-all">🎨</button>
          </div>`;
        return;
      }

      if (screen === 'main') {
        app.innerHTML = `
          <div class="bg-[#111111] rounded-3xl p-8 shadow-2xl">
            <div class="flex items-center justify-between mb-8">
              <h1 class="text-3xl font-bold flex items-center gap-3">👾 Pixie FFlags <span class="text-lg font-normal text-gray-400">— ${currentUser}</span></h1>
              <div class="flex items-center gap-3">
                <button onclick="openSupport()" class="px-7 py-3 bg-[#222] hover:bg-[#333] rounded-3xl text-lg flex items-center gap-2 btn-hover"><i class="fas fa-headset"></i> Поддержка</button>
                <button onclick="openThemeModal()" class="px-7 py-3 bg-[#222] hover:bg-[#333] rounded-3xl text-lg flex items-center gap-2 btn-hover">🎨 Тема</button>
                <div id="robloxStatus" onclick="simulateRobloxStatus()" class="text-xl font-medium px-6 py-3 bg-[#1f1f1f] rounded-3xl cursor-pointer"></div>
              </div>
            </div>

            <div class="mb-8">
              <label class="block text-lg mb-3 font-medium">Ваши FFlags (JSON)</label>
              <textarea id="fflags" oninput="updateButtons()" class="w-full h-56 bg-[#1f1f1f] rounded-3xl p-8 text-base font-mono resize-none focus:ring-4 focus:ring-offset-4 focus:ring-offset-[#111] focus:ring-[${accent}] transition-all">${lastFFlags}</textarea>
            </div>

            <div class="flex justify-end gap-3 mb-10">
              <button onclick="saveFFlags()" class="px-9 py-4 bg-[${accent}] text-black font-bold rounded-3xl text-xl flex items-center gap-2 btn-hover">💾 Сохранить как...</button>
              <button onclick="showSaved()" class="px-9 py-4 bg-[#333] hover:bg-[#444] font-bold rounded-3xl text-xl flex items-center gap-2 btn-hover">📂 Сохранённые</button>
              <button onclick="activateFFlags()" id="activateBtn" class="px-9 py-4 bg-[${accent}] text-black font-bold rounded-3xl text-xl flex items-center gap-2 btn-hover">🚀 Активировать FFlags</button>
              <button onclick="launchRoblox()" class="px-9 py-4 bg-emerald-500 hover:bg-emerald-600 font-bold rounded-3xl text-xl flex items-center gap-2 btn-hover">▶ Запустить Roblox</button>
            </div>

            <div class="flex justify-center">
              <button onclick="stopFFlags()" id="stopBtn" class="px-14 py-6 bg-red-600 hover:bg-red-700 text-white font-bold text-2xl rounded-3xl flex items-center gap-3 btn-hover shadow-lg">⛔ Остановить FFlags</button>
            </div>
          </div>`;
        setTimeout(() => { simulateRobloxStatus(); updateButtons(); }, 400);
        return;
      }

      if (screen === 'admin') {
        app.innerHTML = `
          <div class="bg-[#0f0f0f] rounded-3xl p-8 max-w-[920px] mx-auto shadow-2xl">
            <div class="flex items-center justify-between mb-8">
              <button onclick="render('main')" class="flex items-center gap-3 text-2xl hover:text-[${accent}] transition-all"><i class="fas fa-arrow-left"></i><span class="font-medium">Назад</span></button>
              <h1 class="text-4xl font-bold">👑 Админ-панель Pixie FFlags</h1>
              <div class="text-xl text-gray-400">Онлайн: ${getOnlineCount()} | Всего: ${Object.keys(users).length}</div>
            </div>
            <div class="flex flex-wrap gap-4 mb-8">
              <input id="searchInput" placeholder="🔎 Поиск по нику..." class="flex-1 min-w-[280px] bg-[#1f1f1f] rounded-3xl px-8 py-5 text-xl outline-none focus:ring-2 focus:ring-[${accent}]" onkeyup="if(event.key==='Enter') renderAdminList()">
              <button onclick="renderAdminList()" class="px-10 bg-[#333] hover:bg-[#444] rounded-3xl text-xl font-medium whitespace-nowrap">Обновить</button>
              <button onclick="createNewProfile()" class="px-10 bg-emerald-500 hover:brightness-110 rounded-3xl text-xl font-bold whitespace-nowrap">➕ Новый профиль</button>
              <button onclick="exportUsersToTxt()" class="px-10 bg-blue-600 hover:bg-blue-700 rounded-3xl text-xl font-bold whitespace-nowrap">📤 Экспорт в .txt</button>
            </div>
            <div id="adminList" class="space-y-5 max-h-[520px] overflow-auto pr-2"></div>
          </div>`;
        renderAdminList();
      }
    }

    function getOnlineCount() {
      return Object.values(users).filter(u => u.last_login && (Date.now() - u.last_login) < 600000).length;
    }

    function login() {
      const nick = document.getElementById('nick').value.trim();
      const pass = document.getElementById('pass').value.trim();
      if (!nick || !pass) return alert('Введите ник и пароль');

      if (users[nick]) {
        if (users[nick].password !== pass) return alert('Неверный пароль');
      } else {
        users[nick] = { password: pass, last_login: Date.now(), is_admin: false, expiration: null };
        saveUsers();
      }

      users[nick].last_login = Date.now();
      saveUsers();
      currentUser = nick;
      isAdmin = users[nick].is_admin;
      render('main');
    }

    function simulateRobloxStatus() {
      const el = document.getElementById('robloxStatus');
      if (!el) return;
      const running = Math.random() > 0.4;
      el.innerHTML = running ? `<span class="text-emerald-400 flex items-center gap-2"><i class="fas fa-circle"></i> Roblox запущен</span>` : `<span class="text-red-400 flex items-center gap-2"><i class="fas fa-circle"></i> Roblox не запущен</span>`;
    }

    function updateButtons() {
      const content = document.getElementById('fflags').value.trim();
      const activateBtn = document.getElementById('activateBtn');
      const stopBtn = document.getElementById('stopBtn');
      if (activateBtn) activateBtn.classList.toggle('disabled-btn', content === '');
      if (stopBtn) stopBtn.classList.toggle('disabled-btn', content === '');
    }

    function saveFFlags() {
      const content = document.getElementById('fflags').value.trim();
      if (!content) return alert('Введите FFlags');
      const name = prompt('Название набора FFlags:');
      if (!name) return;
      let saved = JSON.parse(localStorage.getItem('pixie_saved') || '[]');
      saved.push({ name, content, time: Date.now() });
      localStorage.setItem('pixie_saved', JSON.stringify(saved));
      showToast('✅ Набор сохранён!', accent);
    }

    function showSaved() {
      let saved = JSON.parse(localStorage.getItem('pixie_saved') || '[]');
      let html = saved.map((item, i) => `
        <div class="bg-[#1f1f1f] rounded-3xl p-6 flex justify-between items-center card">
          <div><div class="text-2xl font-semibold">${item.name}</div><div class="text-xs text-gray-400">${new Date(item.time).toLocaleString('ru-RU')}</div></div>
          <div class="flex gap-3">
            <button onclick="loadSaved(${i});" class="bg-emerald-500 text-black px-8 py-3 rounded-3xl font-medium">Загрузить</button>
            <button onclick="deleteSaved(${i});showSaved()" class="bg-red-500 px-8 py-3 rounded-3xl">🗑</button>
          </div>
        </div>`).join('');
      const modalHTML = `<div onclick="if(event.target===this)this.remove()" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50"><div onclick="event.stopImmediatePropagation()" class="modal bg-[#111] rounded-3xl p-10 w-[640px] max-h-[80vh] overflow-auto"><h2 class="text-3xl font-bold mb-8 flex items-center justify-between">📂 Сохранённые FFlags <button onclick="this.closest('.fixed').remove()" class="text-3xl">✕</button></h2><div class="space-y-4">${html || '<p class="text-center py-16 text-gray-400 text-xl">Пока ничего не сохранено</p>'}</div></div></div>`;
      const modal = document.createElement('div');
      modal.innerHTML = modalHTML;
      document.body.appendChild(modal.firstElementChild);
    }

    function loadSaved(i) {
      let saved = JSON.parse(localStorage.getItem('pixie_saved') || '[]');
      lastFFlags = saved[i].content;
      document.getElementById('fflags').value = lastFFlags;
      document.querySelector('.fixed').remove();
      updateButtons();
      showToast('✅ Загружено!', accent);
    }

    function deleteSaved(i) {
      let saved = JSON.parse(localStorage.getItem('pixie_saved') || '[]');
      saved.splice(i, 1);
      localStorage.setItem('pixie_saved', JSON.stringify(saved));
    }

    function activateFFlags() {
      const content = document.getElementById('fflags').value.trim();
      if (!content) return;
      navigator.clipboard.writeText(content).then(() => {
        showToast('✅ FFlags скопированы!', accent);
        const msg = document.createElement('div');
        msg.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-[#111] text-white px-8 py-6 rounded-3xl shadow-2xl text-center max-w-md z-50";
        msg.innerHTML = `FFlags скопированы в буфер обмена!<br><br>1. Откройте папку с Roblox<br>2. Найдите файл <b>clientAppSettings.json</b><br>3. Вставьте туда скопированный текст<br>4. Сохраните и перезапустите Roblox`;
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 9000);
      });
    }

    function stopFFlags() {
      const content = document.getElementById('fflags').value.trim();
      if (!content) return;
      if (confirm('Остановить все FFlags и вернуть оригинальные настройки Roblox?')) {
        lastFFlags = "";
        document.getElementById('fflags').value = "";
        updateButtons();
        showToast('⛔ FFlags остановлены и сброшены', '#ff6666');
      }
    }

    function launchRoblox() {
      showToast('▶ Roblox запускается...', '#00cc66');
    }

    function openSupport() {
      if (!isAdmin) {
        showToast('🛟 Напишите в Telegram бота @PixieShopbot', accent);
        return;
      }
      render('admin');
    }

    function renderAdminList() {
      const container = document.getElementById('adminList');
      if (!container) return;
      const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
      let html = '';
      Object.keys(users).forEach(nick => {
        if (search && !nick.toLowerCase().includes(search)) return;
        const u = users[nick];
        const online = u.last_login && (Date.now() - u.last_login) < 600000;
        html += `
          <div class="card bg-[#1f1f1f] rounded-3xl p-7 flex items-center gap-8">
            <div class="text-5xl">${online ? '🟢' : '🔴'}</div>
            <div class="flex-1">
              <div class="flex items-center gap-4"><span class="text-3xl font-bold">${nick}</span>${u.is_admin ? '<span class="px-4 py-1 bg-amber-400 text-black text-sm font-bold rounded-2xl">АДМИН</span>' : ''}</div>
              <p class="text-gray-400">Последний вход: ${formatLastLogin(u.last_login)}</p>
            </div>
            <button onclick="copyPass('${nick}')" class="px-8 py-4 bg-[#333] hover:bg-[#444] rounded-3xl font-medium text-lg">📋 Пароль</button>
            ${nick !== currentUser ? `<button onclick="deleteUser('${nick}')" class="px-8 py-4 bg-red-500 hover:bg-red-600 rounded-3xl font-medium text-lg">🗑 Удалить</button>` : ''}
          </div>`;
      });
      container.innerHTML = html || `<p class="text-center py-20 text-2xl text-gray-400">Ничего не найдено</p>`;
    }

    function formatLastLogin(ts) {
      if (!ts) return 'Никогда';
      const min = Math.floor((Date.now() - ts) / 60000);
      return min < 1 ? 'Только что' : min < 60 ? `${min} мин. назад` : `${Math.floor(min/60)} ч. назад`;
    }

    function copyPass(nick) {
      navigator.clipboard.writeText(users[nick].password);
      showToast(`Пароль для ${nick} скопирован`, accent);
    }

    function deleteUser(nick) {
      if (confirm(`Удалить пользователя ${nick} навсегда?`)) {
        delete users[nick];
        saveUsers();
        renderAdminList();
        showToast(`${nick} удалён`, '#ff6666');
      }
    }

    function createNewProfile() {
      const modal = document.createElement('div');
      modal.className = "fixed inset-0 bg-black/80 flex items-center justify-center z-50";
      modal.innerHTML = `
        <div onclick="event.stopImmediatePropagation()" class="modal bg-[#111111] rounded-3xl p-10 w-[520px]">
          <h2 class="text-3xl font-bold mb-6 text-center">Создать новый профиль</h2>
          <input id="newNick" placeholder="Ник" class="w-full bg-[#1f1f1f] rounded-3xl px-6 py-4 text-xl mb-4 outline-none">
          <input id="newPass" type="password" placeholder="Пароль" class="w-full bg-[#1f1f1f] rounded-3xl px-6 py-4 text-xl mb-6 outline-none">
          
          <div class="flex items-center justify-between mb-6">
            <span class="text-lg">Аккаунт навсегда</span>
            <div onclick="togglePermanent(this)" id="permanentToggle" class="toggle w-14 h-8 bg-emerald-500 rounded-full relative cursor-pointer flex items-center px-1">
              <div class="w-6 h-6 bg-white rounded-full shadow-md ml-auto"></div>
            </div>
          </div>

          <div id="daysContainer" class="hidden mb-6">
            <label class="block text-lg mb-2">Срок действия (дней)</label>
            <input id="daysInput" type="number" value="30" min="1" class="w-full bg-[#1f1f1f] rounded-3xl px-6 py-4 text-xl outline-none">
          </div>

          <div class="flex gap-4">
            <button onclick="this.closest('.fixed').remove()" class="flex-1 py-5 bg-gray-700 rounded-3xl text-xl">Отмена</button>
            <button onclick="confirmCreateProfile()" class="flex-1 py-5 bg-emerald-500 text-black font-bold rounded-3xl text-xl">Создать</button>
          </div>
        </div>`;
      document.body.appendChild(modal);
    }

    function togglePermanent(el) {
      const isPermanent = el.classList.contains('bg-emerald-500');
      if (isPermanent) {
        el.classList.remove('bg-emerald-500');
        el.classList.add('bg-red-500');
        el.querySelector('div').classList.remove('ml-auto');
        document.getElementById('daysContainer').classList.remove('hidden');
      } else {
        el.classList.remove('bg-red-500');
        el.classList.add('bg-emerald-500');
        el.querySelector('div').classList.add('ml-auto');
        document.getElementById('daysContainer').classList.add('hidden');
      }
    }

    function confirmCreateProfile() {
      const nick = document.getElementById('newNick').value.trim();
      const pass = document.getElementById('newPass').value.trim();
      const toggle = document.getElementById('permanentToggle');
      const isPermanent = toggle.classList.contains('bg-emerald-500');
      const days = isPermanent ? null : parseInt(document.getElementById('daysInput').value);

      if (!nick || !pass) return alert('Ник и пароль обязательны');
      if (users[nick]) return alert('Ник уже занят');

      const expiration = days ? Date.now() + days * 24 * 60 * 60 * 1000 : null;
      users[nick] = { password: pass, last_login: null, is_admin: false, expiration: expiration };
      saveUsers();
      document.querySelector('.fixed').remove();
      renderAdminList();
      showToast(`Профиль ${nick} создан!`, accent);
    }

    function exportUsersToTxt() {
      let text = "══════════════════════════════════════\n";
      text += "          Pixie FFlags — СПИСОК ПОЛЬЗОВАТЕЛЕЙ\n";
      text += "══════════════════════════════════════\n\n";
      text += `Дата экспорта: ${new Date().toLocaleString('ru-RU')}\n`;
      text += `Всего пользователей: ${Object.keys(users).length}\n`;
      text += `Онлайн сейчас: ${getOnlineCount()}\n\n`;
      text += "Ник          | Статус     | Онлайн   | Последний вход          | Срок\n";
      text += "────────────────────────────────────────────────────────────────────\n";

      Object.keys(users).forEach(nick => {
        const u = users[nick];
        const status = u.is_admin ? "АДМИН     " : "Обычный   ";
        const online = u.last_login && (Date.now() - u.last_login) < 600000 ? "Да      " : "Нет     ";
        const last = u.last_login ? new Date(u.last_login).toLocaleString('ru-RU') : "Никогда";
        const exp = u.expiration ? new Date(u.expiration).toLocaleDateString('ru-RU') : "Навсегда";
        text += `${nick.padEnd(12)} | ${status} | ${online} | ${last.padEnd(23)} | ${exp}\n`;
      });

      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Pixie_Users_${new Date().toISOString().slice(0,16).replace(/:/g, '-')}.txt`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('📤 Список экспортирован в .txt', '#00ccff');
    }

    function openThemeModal() {
      const colors = [
        {name:"Чёрная", c:"#1f1f1f"}, {name:"Синяя", c:"#1e90ff"}, {name:"Розовая", c:"#ff69b4"},
        {name:"Зелёная", c:"#00ff7f"}, {name:"Фиолетовая", c:"#ba55d3"}, {name:"Оранжевая", c:"#ff8c00"},
        {name:"Бирюзовая", c:"#40e0d0"}, {name:"Красная", c:"#ff3333"}, {name:"Жёлтая", c:"#ffd700"},
        {name:"Лайм", c:"#aaff00"}, {name:"Тёмно-фиолетовая", c:"#8a2be2"}, {name:"Мятная", c:"#00ffaa"}
      ];
      let html = `<div onclick="if(event.target===this)this.remove()" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50"><div onclick="event.stopImmediatePropagation()" class="modal bg-[#111] rounded-3xl p-10 w-[820px]"><h2 class="text-3xl font-bold mb-8 text-center">Выберите тему</h2><div class="grid grid-cols-4 gap-4">`;
      colors.forEach(t => {
        html += `<button onclick="changeTheme('${t.c}');this.closest('.fixed').remove()" class="gradient-btn h-28 rounded-3xl text-2xl font-bold flex items-center justify-center" style="--accent-color: ${t.c}">${t.name}</button>`;
      });
      html += `</div></div></div>`;
      const modal = document.createElement('div');
      modal.innerHTML = html;
      document.body.appendChild(modal.firstElementChild);
    }

    function changeTheme(newAccent) {
      accent = newAccent;
      localStorage.setItem('pixie_accent', accent);
      showToast('Тема применена и сохранена!', accent);
      if (currentUser) render('main');
      else render('welcome');
    }

    function showToast(text, color) {
      const toast = document.createElement('div');
      toast.className = `toast fixed bottom-8 right-8 px-8 py-5 rounded-3xl text-xl font-medium shadow-2xl flex items-center gap-3`;
      toast.style.backgroundColor = '#111111';
      toast.style.color = color;
      toast.style.border = `3px solid ${color}`;
      toast.innerHTML = `<i class="fas fa-check-circle"></i> ${text}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3200);
    }

    // Запуск
    saveUsers();
    render('splash');
  </script>
</body>
</html>
